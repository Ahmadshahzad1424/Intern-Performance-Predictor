<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internee.pk | AI Performance Analytics</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-background"></div>
    
    <div class="container">
        <header>
            <div class="logo">INTERNEE<span>.AI</span></div>
            <p class="subtitle">Enterprise Performance Prediction Engine</p>
        </header>

        <main class="grid">
            <!-- Input Section -->
            <section class="card input-card">
                <h2><i class="icon">📊</i> Intern Metrics</h2>
                <form id="prediction-form">
                    <div class="input-group">
                        <label>Task Completion Time (Hours)</label>
                        <input type="number" id="time" value="40" min="0" max="200" required>
                        <small>Avg. hours to complete project tasks</small>
                    </div>

                    <div class="input-group">
                        <label>Feedback Rating (1 - 5)</label>
                        <input type="number" id="feedback" value="4.5" step="0.1" min="1" max="5" required>
                        <small>Average mentor feedback score</small>
                    </div>

                    <div class="input-group">
                        <label>Attendance Rate (0.0 - 1.0)</label>
                        <input type="number" id="attendance" value="0.95" step="0.01" min="0" max="1" required>
                        <small>Percentage of meetings/shifts attended</small>
                    </div>

                    <button type="submit" id="submit-btn">Run AI Analysis</button>
                </form>
            </section>

            <!-- Results Section -->
            <section class="card result-card" id="results-container" style="display: none;">
                <h2><i class="icon">🎯</i> Prediction Analysis</h2>
                
                <div class="score-display">
                    <div class="score-ring">
                        <span id="predicted-score">0</span>
                        <small>Predicted Score</small>
                    </div>
                </div>

                <div class="metrics-grid">
                    <div class="metric">
                        <span class="label">Status</span>
                        <span class="value" id="status-val">--</span>
                    </div>
                    <div class="metric">
                        <span class="label">Efficiency</span>
                        <span class="value" id="efficiency-val">--</span>
                    </div>
                </div>

                <div class="recommendation-box">
                    <h3>Action Required</h3>
                    <p id="recommendation-text">Initializing AI engine...</p>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
